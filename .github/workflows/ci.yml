name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run audit
        run: npm audit --audit-level=high

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration
        env:
          PORT: 3099
          HOST: 127.0.0.1

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aion-repair-os:ci .

      - name: Verify Docker image runs
        run: |
          docker run -d --name aion-ci -e PORT=3099 -e HOST=0.0.0.0 -p 3099:3099 aion-repair-os:ci
          sleep 5
          curl -sf http://127.0.0.1:3099/api/health || (docker logs aion-ci && exit 1)
          docker stop aion-ci
          docker rm aion-ci
