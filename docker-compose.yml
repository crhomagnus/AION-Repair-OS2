services:
  aion-repair-os:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aion-repair-os
    network_mode: host
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3002
      ADB_HOST: 127.0.0.1
      ADB_PORT: 5037
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3002/api/health').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
