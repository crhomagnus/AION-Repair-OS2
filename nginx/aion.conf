upstream aion_backend {
    server 127.0.0.1:3002;
}

server {
    listen 80;
    server_name _;

    # Redirect to HTTPS when certificate is configured
    # Uncomment the next two lines after running certbot:
    # return 301 https://$host$request_uri;
    # }
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #     ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Rate limiting zones (define in nginx.conf http block):
    # limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    # limit_req_zone $binary_remote_addr zone=chat:10m rate=10r/m;

    # Static files and main app
    location / {
        proxy_pass http://aion_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket upgrade
    location /ws {
        proxy_pass http://aion_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # API with rate limiting
    location /api/ {
        # limit_req zone=api burst=10 nodelay;
        proxy_pass http://aion_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Chat endpoint with stricter rate limiting
    location /api/chat {
        # limit_req zone=chat burst=5 nodelay;
        proxy_pass http://aion_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Block direct access to sensitive endpoints from outside
    location /api/ai/key {
        # Only allow from localhost or with admin token
        proxy_pass http://aion_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Request size limit
    client_max_body_size 2m;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 60s;
}
